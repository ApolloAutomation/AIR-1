substitutions:
  name: apollo-air-1
  version: "26.7.7.1"
  device_description: ${name} made by Apollo Automation - version ${version}.
  # Default OTA password. Override in your device YAML by re-declaring
  # `substitutions: { ota_password: !secret <name>_ota_password }` so each
  # device on your network uses a unique secret instead of the shared default.
  ota_password: "apolloautomation"
  # Firmware variant identity: overridden to "true" by AIR-1_BLE.yaml so the
  # Bluetooth Proxy select can self-correct to what is actually running.
  ble_firmware: "false"
  # Manifest URL bases. Stable = GitHub Pages (main branch builds).
  # Beta = rolling "beta" pre-release assets (beta branch builds).
  stable_manifest_base: "https://apolloautomation.github.io/AIR-1"
  beta_manifest_base: "https://github.com/ApolloAutomation/AIR-1/releases/download/beta"

esphome:
  # List form so package merging concatenates with each variant's own on_boot
  # entries (mapping form would be replaced by the variant's block instead).
  on_boot:
    - priority: -100
      then:
        # The Bluetooth Proxy select mirrors the firmware actually running, so
        # a failed or abandoned switch snaps back to the truth on reboot.
        - lambda: |-
            if (std::string("${ble_firmware}") == "true") {
              id(firmware_ble).publish_state("Enabled");
            } else {
              id(firmware_ble).publish_state("Disabled");
            }
        - script.execute: apply_ota_source

esp32:
  variant: esp32c3
  flash_size: 4MB
  framework:
    type: esp-idf

api:
  on_client_connected:
    - delay: 90s
    - if:
        condition:
          or:
            - binary_sensor.is_on: ota_mode
            - switch.is_on: prevent_sleep
        then:
          - lambda: |- 
              ESP_LOGW("Apollo", "Preventing Deep Sleep Due To OTA Or Switch");
              id(deep_sleep_1).prevent_deep_sleep(); 
        else:
          - lambda: |-
              id(reportAllValues).execute();
          - deep_sleep.enter:
              id: deep_sleep_1
  actions:
    #Co2 Calibration Action
    - action: calibrate_co2_value
      variables:
        co2_ppm: float
      then:
        - scd4x.perform_forced_calibration:
            value: !lambda "return co2_ppm;"
            id: scd40
    - action: sen55_clean
      then:
        - sen5x.start_fan_autoclean: sen55
  reboot_timeout: 0s

captive_portal:

web_server:
  port: 80
  version: 3

globals:
  - id: cycleCounter
    type: int
    restore_value: no
    initial_value: '0'
  - id: button_press_timestamp
    restore_value: no
    type: uint32_t
    initial_value: '0'
  - id: runTest
    restore_value: yes
    type: bool
    initial_value: "true"
  - id: testCycleCount
    type: int
    restore_value: no
    initial_value: "0"
  - id: dps310Passed
    restore_value: no
    type: bool
    initial_value: "false"


i2c:
  sda: GPIO1
  scl: GPIO0
  id: bus_a

deep_sleep:
  id: deep_sleep_1
  sleep_duration: 5min
  run_duration: 2min

number:
  - platform: template
    name: "Air Quality LED Brightness"
    id: air_quality_led_brightness
    icon: mdi:brightness-6
    optimistic: true
    restore_value: true
    entity_category: "config"
    unit_of_measurement: "%"
    min_value: 5
    max_value: 100
    step: 1
    initial_value: 100
    mode: slider
    on_value:
      then:
        - script.execute: update_air_quality_led

  - platform: template
    name: SEN55 Temperature Offset
    id: sen55_temperature_offset
    restore_value: true
    initial_value: 6.0
    min_value: -70.0
    max_value: 70.0
    entity_category: "CONFIG"
    unit_of_measurement: "°C"
    optimistic: true
    update_interval: never
    step: 0.1
    mode: box
  - platform: template
    name: SEN55 Humidity Offset
    id: sen55_humidity_offset
    restore_value: true
    initial_value: 0
    min_value: -70.0
    max_value: 70.0
    entity_category: "CONFIG"
    unit_of_measurement: "%"
    optimistic: true
    update_interval: never
    step: 0.1
    mode: box
  - platform: template
    name: "DPS310 Pressure Offset"
    id: dps310_pressure_offset
    disabled_by_default: true
    restore_value: true
    initial_value: 0.0
    min_value: -100.0
    max_value: 100.0
    entity_category: "CONFIG"
    unit_of_measurement: "hPa"
    optimistic: true
    update_interval: never
    step: 0.1
    mode: box

  - platform: template
    name: "Sleep Duration"
    id: deep_sleep_sleep_duration
    min_value: 0
    max_value: 800
    step: 1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 5
    icon: "mdi:arrow-collapse-right"
    entity_category: CONFIG
    unit_of_measurement: "min"
    on_value:
      then:
        - lambda: |-
            id(deep_sleep_1).set_sleep_duration(x * 60 * 1000);
    

binary_sensor:
  - platform: status
    name: Online
    id: ink_ha_connected
  - platform: gpio
    pin: 
      number: GPIO9
      inverted: true
      mode:
        input: true
        pullup: true
      ignore_strapping_warning: true
    id: reset_button  
    on_press:
      then:
        - lambda: |-
            id(button_press_timestamp) = millis();    
    on_release:
      then:
        - lambda: |-
            if (millis() - id(button_press_timestamp) >= 10000) {
              id(prevent_sleep).turn_on();
              id(factory_reset_switch).turn_on();
            }
            else if (millis() - id(button_press_timestamp) >= 3000) {
              //Turn Prevent Sleep On
              id(prevent_sleep).turn_on();
              //Prevent Sleep
              id(deep_sleep_1).prevent_deep_sleep();
            }
            else {
              // StatusCheck
              id(statusCheck).execute();
              delay(3000);
              id(testCycleCount) = 0;
              id(runTest) = true;
              id(testScript).execute();
            }
  - platform: homeassistant
    name: "OTA Mode"
    id: ota_mode
    entity_id: input_boolean.apollo_ota_mode
    on_press:
      then:
        - lambda: |- 
            id(deep_sleep_1).prevent_deep_sleep();
    on_release:  
      then:
        - if:
            condition:
              switch.is_off: prevent_sleep
            then:
              - lambda: |- 
                  id(deep_sleep_1).allow_deep_sleep();

sensor:
  - platform: internal_temperature
    name: "ESP Temperature"
    id: sys_esp_temperature

  - platform: uptime
    name: Uptime
    id: sys_uptime
    update_interval: 60s

  - platform: wifi_signal
    name: RSSI
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"

  - platform: scd4x
    id: scd40
    co2:
      name: "CO2"
      id: "co2"
      on_value:
        - if:
            condition:
              lambda: 'return id(air_quality_led_source).current_option() == "CO2";'
            then:
              - script.execute: update_air_quality_led
    automatic_self_calibration: true
    update_interval: 60s
    measurement_mode: "periodic"
    i2c_id: bus_a
    ambient_pressure_compensation_source: dps310pressure

  - platform: dps310
    id: dps_310
    pressure:
      name: "DPS310 Pressure"
      id: dps310pressure
      filters:
        - lambda: |-
            float offset = id(dps310_pressure_offset).state;
            return isnan(offset) ? x : x + offset;
    temperature:
      id: dps310temperature
    update_interval: 30s
    i2c_id: bus_a

  - platform: sen5x
    id: sen55
    pm_1_0:
      name: "PM <1µm Weight concentration"
      id: pm_1_0
      accuracy_decimals: 1
    pm_2_5:
      name: "PM <2.5µm Weight concentration"
      id: pm_2_5
      accuracy_decimals: 1
    pm_4_0:
      name: "PM <4µm Weight concentration"
      id: pm_4_0
      accuracy_decimals: 1
    pm_10_0:
      name: "PM <10µm Weight concentration"
      id: pm_10_0
      accuracy_decimals: 1
    temperature:
      name: "SEN55 Temperature"
      id: sen55_temperature
      filters:
        - lambda: return x - id(sen55_temperature_offset).state;
      accuracy_decimals: 1
    humidity:
      name: "SEN55 Humidity"
      id: sen55_humidity
      filters:
        - lambda: return x - id(sen55_humidity_offset).state;
      accuracy_decimals: 1
    voc:
      name: "SEN55 VOC"
      id: sen55_voc
      on_value:
        - if:
            condition:
              lambda: 'return id(air_quality_led_source).current_option() == "VOC Index";'
            then:
              - script.execute: update_air_quality_led
      algorithm_tuning:
        #https://sensirion.com/media/documents/25AB572C/62B463AA/Sensirion_Engineering_Guidelines_SEN5x.pdf
        index_offset: 100
        learning_time_offset_hours: 72
        learning_time_gain_hours: 72
        gating_max_duration_minutes: 180
        std_initial: 50
        gain_factor: 230
    nox:
      name: "SEN55 NOX"
      id: sen55_nox
    acceleration_mode: low
    store_baseline: true
    address: 0x69
    update_interval: 10s

  - platform: template
    name: "PM 0.3 To 1 µm"
    id: pm0_3_to_1
    disabled_by_default: true
    lambda: return id(pm_1_0).state;
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
  
  - platform: template
    name: "PM 1 To 2.5 µm"
    id: pm1_to_2_5
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_2_5).state - id(pm_1_0).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s
  
  - platform: template
    name: "PM 2.5 To 4 µm"
    id: pm2_5_to_4
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_4_0).state - id(pm_2_5).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s

  - platform: template
    name: "PM 4 To 10 µm"
    id: pm4_to_10
    disabled_by_default: true
    lambda: return std::max(0.0f, id(pm_10_0).state - id(pm_4_0).state);
    unit_of_measurement: "µg/m³"
    state_class: measurement
    icon: mdi:air-filter
    update_interval: 10s

  - platform: aqi
    name: "NowCast AQI"
    id: nowcast_aqi
    pm_2_5: pm_2_5
    pm_10_0: pm_10_0
    calculation_type: AQI
    device_class: aqi
    on_value:
      - if:
          condition:
            lambda: 'return id(air_quality_led_source).current_option() == "NowCast AQI";'
          then:
            - script.execute: update_air_quality_led

  - platform: mics_4514
    id: mics4514
    nitrogen_dioxide:
      name: Nitrogen Dioxide
      id: nitrogen_dioxide
    carbon_monoxide:
      name: Carbon Monoxide
      id: carbon_monoxide
    hydrogen:
      name: Hydrogen
      id: hydrogen
    ethanol:
      name: Ethanol
      id: ethanol
    methane:
      name: Methane
      id: methane
    ammonia:
      name: Ammonia
      id: ammonia
    update_interval: 60s

light:
  - platform: esp32_rmt_led_strip
    id: rgb_light
    name: "RGB Light"
    pin: GPIO3
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 3
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

button:
  - platform: restart
    icon: mdi:power-cycle
    name: "ESP Reboot"

  - platform: factory_reset
    disabled_by_default: True
    name: "Factory Reset ESP"
    id: factory_reset_all

  - platform: template
    name: "Calibrate SCD40 To 420ppm"
    id: set_SCD40_calibrate
    on_press:
      - scd4x.perform_forced_calibration:
          value: 420
          id: scd40

  - platform: template
    name: "Clean SEN55"
    id: clean_sen55
    on_press:
      - sen5x.start_fan_autoclean: sen55

  - platform: template
    name: "Firmware Update"
    id: update_firmware
    icon: mdi:cloud-download
    entity_category: "config"
    on_press:
      - logger.log: "Applying firmware based on selected channel and type"
      # OTA download needs the device awake for its whole duration.
      - lambda: |-
          id(deep_sleep_1).prevent_deep_sleep();
      # Free heap for the TLS download on the BLE variant. Guarded so the
      # non-BLE variant compiles the same YAML.
      - lambda: |-
          #ifdef USE_ESP32_BLE
          if (esp32_ble::global_ble && esp32_ble::global_ble->is_active()) {
            ESP_LOGI("firmware", "Disabling BLE for firmware update");
            esp32_ble::global_ble->disable();
          }
          #endif
      - delay: 3s
      - script.execute: apply_ota_source
      - script.wait: apply_ota_source
      - delay: 2s
      - update.perform:
          id: update_http_request
          force_update: true
      # Only reached if the update did not start (e.g. manifest unreachable).
      - lambda: |-
          #ifdef USE_ESP32_BLE
          if (esp32_ble::global_ble) {
            ESP_LOGI("firmware", "Re-enabling BLE (no update performed)");
            esp32_ble::global_ble->enable();
          }
          #endif

text_sensor:
    # Convert VOC Index To Text: 
    # https://sensirion.com/media/documents/02232963/6294E043/Info_Note_VOC_Index.pdf
    # https://sensirion.com/media/documents/ACD82D45/6294DFC0/Info_Note_Integration_VOC_NOx_Sensor.pdf
  - platform: template
    name: "VOC Quality"
    id: voc_quality
    icon: mdi:air-filter
    lambda: |-
      if (id(sen55_voc).state < 80) {
        return std::string("Improved");} 
      else if (id(sen55_voc).state < 150) {
        return std::string("Normal");} 
      else if (id(sen55_voc).state < 250) {
        return std::string("Abnormal");} 
      else if (id(sen55_voc).state < 400) {
        return std::string("Very abnormal");} 
      else if (id(sen55_voc).state >= 400) {
        return std::string("Extremely abnormal");}
      else {
        return std::string("Unknown");}

  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      entity_category: "diagnostic"
  - platform: version
    name: "ESPHome Version"
    hide_timestamp: true
    entity_category: "diagnostic"
  - platform: template
    name: "Apollo Firmware Version"
    id: apollo_firmware_version
    update_interval: never
    entity_category: "diagnostic"

switch:
  - platform: factory_reset
    id: factory_reset_switch
    internal: true

  - platform: template
    name: "Prevent Sleep"
    id: prevent_sleep
    icon: mdi:sleep
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: "config"
    on_turn_on:
      then:
        - lambda: |-
            id(deep_sleep_1).prevent_deep_sleep();
    on_turn_off:
      then:
        - if:
            condition:
              binary_sensor.is_off: ota_mode
            then:
              - lambda: |-
                  id(deep_sleep_1).allow_deep_sleep();

  - platform: template
    name: "CO2 Auto Calibration"
    id: co2_auto_calibration
    icon: mdi:molecule-co2
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    entity_category: "config"
    on_turn_on:
      then:
        - script.execute:
            id: setCo2AutoCalibration
            enable: true
    on_turn_off:
      then:
        - script.execute:
            id: setCo2AutoCalibration
            enable: false

select:
  - platform: template
    name: "Air Quality LED Source"
    id: air_quality_led_source
    icon: mdi:led-on
    optimistic: true
    restore_value: true
    entity_category: "config"
    options: ["Off", "NowCast AQI", "CO2", "VOC Index"]
    initial_option: "Off"
    on_value:
      then:
        - script.execute: update_air_quality_led

  - platform: template
    name: "Firmware Channel"
    id: firmware_channel
    icon: mdi:source-branch
    entity_category: "config"
    optimistic: true
    restore_value: true
    options:
      - "Stable"
      - "Beta"
    initial_option: "Stable"
    on_value:
      then:
        - script.execute: apply_ota_source

  - platform: template
    name: "Bluetooth Proxy"
    id: firmware_ble
    icon: mdi:bluetooth
    entity_category: "config"
    optimistic: true
    restore_value: true
    options:
      - "Disabled"
      - "Enabled"
    initial_option: "Disabled"
    on_value:
      then:
        - script.execute: apply_ota_source

script:
  - id: apply_ota_source
    # Sets the OTA manifest URL from the two selectors: Bluetooth Proxy
    # (Disabled/Enabled) x Firmware Channel (Stable/Beta).
    # Stable = GitHub Pages, Beta = rolling "beta" release assets.
    then:
      - lambda: |-
          const bool ble  = id(firmware_ble).current_option() == "Enabled";
          const bool beta = id(firmware_channel).current_option() == "Beta";
          std::string url;
          if (beta) {
            url = ble
              ? "${beta_manifest_base}/manifest-ble.json"
              : "${beta_manifest_base}/manifest-standard.json";
          } else {
            url = ble
              ? "${stable_manifest_base}/firmware-ble/manifest.json"
              : "${stable_manifest_base}/firmware/manifest.json";
          }
          ESP_LOGI("firmware", "OTA manifest set to: %s", url.c_str());
          id(update_http_request).set_source_url(url);
      - component.update: update_http_request

  - id: setCo2AutoCalibration
    mode: restart
    parameters:
      enable: bool
    then:
      #The SCD40 forgets this setting on power loss and the scd4x component
      #re-applies the YAML default during setup (~1.5s after boot), so when this
      #runs at boot (via the restored switch state) wait for setup to finish first.
      - if:
          condition:
            lambda: "return millis() < 20000;"
          then:
            - delay: 20s
      #The sensor only accepts the ASC command while idle, so stop periodic
      #measurement first, then restart it. Same sequence the component uses
      #for forced calibration.
      - lambda: |-
          id(scd40).write_command((uint16_t) 0x3F86); //stop periodic measurement
      - delay: 500ms
      - lambda: |-
          id(scd40).set_automatic_self_calibration(enable);
          if (!id(scd40).write_command((uint16_t) 0x2416, (uint16_t) (enable ? 1 : 0))) {
            ESP_LOGE("Apollo", "Failed to set CO2 auto calibration");
          } else {
            ESP_LOGI("Apollo", "CO2 auto calibration %s", enable ? "enabled" : "disabled");
          }
      - delay: 10ms
      - lambda: |-
          id(scd40).write_command((uint16_t) 0x21B1); //start periodic measurement

  - id: testScript
    then:
      if: 
        condition:
          - lambda: "return id(runTest) == true;"
        then:
          - lambda: "id(runTest) = false;"
          - lambda: "id(testCycleCount) = 0;"
          - while:
              condition:
                - lambda: "return id(testCycleCount) < 5;"
              then:
                - if:
                    condition:
                      - lambda: "return id(dps310Passed) == false;"
                    then:
                      - if:
                          condition:
                            - lambda: "return id(dps310pressure).state > 800 && id(dps310pressure).state < 1200;"
                          then:
                            - lambda: "id(dps310Passed) = true;"
              
                - if:
                    condition:
                      - lambda: "return id(dps310Passed);"
                    then:
                      - lambda: "id(testCycleCount) = 10;"
                - lambda: "id(runTest) = false;"
                - delay: 1s
                - lambda: "id(testCycleCount) += 1;"
          
          #Check If Test Passed To Trigger Lights
          - if:
              condition:
                - lambda: "return id(dps310Passed);"
              then:
                - lambda: "id(runTest) = false;"
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 100%
                    blue: 0%
                - delay: 5s
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 0%
                    blue: 0%
                - light.turn_off:
                    id: rgb_light
                
              else:
                - lambda: "id(runTest) = false;"
                - light.turn_on:
                    id: rgb_light
                    red: 100%
                    green: 0%
                    blue: 0%
                - delay: 5s
                - light.turn_on:
                    id: rgb_light
                    red: 0%
                    green: 0%
                    blue: 0%
                - light.turn_off:
                    id: rgb_light

          - script.execute: restore_air_quality_led

  - id: statusCheck
    then:
      - if:
          condition:
            - lambda: 'return id(ink_ha_connected).state;'
          then:
            - logger.log: "Apollo Automation: Connected To HA"
            - light.turn_on: 
                id: rgb_light
                brightness: 100%
                red: 0%
                green: 0%
                blue: 100%
          else:
            - if:
                condition:
                  - wifi.connected
                then:
                  - logger.log: "Apollo Automation: Connected To Wifi"
                  - light.turn_on: 
                      id: rgb_light
                      brightness: 100%
                      red: 0%
                      green: 100%
                      blue: 0%
                else:
                  - logger.log: "Apollo Automation: Not Connected To Wifi"
                  - light.turn_on: 
                      id: rgb_light
                      brightness: 100%
                      red: 100%
                      green: 100%
                      blue: 0%
      - delay: 5s
      - light.turn_off: rgb_light
      - script.execute: restore_air_quality_led
  - id: reportAllValues
    then:
      - component.update: sen55
      - component.update: mics4514
      - component.update: dps_310
      - component.update: scd40
      - component.update: wifi_signal_db
      - component.update: sys_esp_temperature
      - component.update: sys_uptime
      - component.update: pm0_3_to_1
      - component.update: pm1_to_2_5
      - component.update: pm2_5_to_4
      - component.update: pm4_to_10
      - component.update: voc_quality

  - id: update_air_quality_led
    then:
      - lambda: |-
          // The select's restore_value publishes during component setup and
          // fires on_value before rgb_light (esp32_rmt_led_strip) is
          // initialized; touching the light then faults in schedule_show().
          // Don't write the LED in the first few seconds after boot. The
          // sensor/select/brightness triggers all run normally after that.
          if (millis() < 5000) {
            return;
          }

          // While statusCheck or testScript owns the LED (button-press status
          // flash, boot self-test), leave rgb_light alone so this updater
          // doesn't override their colors mid-display.
          if (id(statusCheck).is_running() || id(testScript).is_running()) {
            return;
          }

          const std::string src = id(air_quality_led_source).current_option();

          if (src == "Off") {
            id(rgb_light).turn_off().perform();
            return;
          }

          // Map the selected metric to a severity band: 0=Good … 5=Hazardous.
          // Each metric has its own scale; bands share one color table below.
          int band = -1;
          if (src == "NowCast AQI") {                // US EPA AQI
            const float x = id(nowcast_aqi).state;
            if (isnan(x)) { id(rgb_light).turn_off().perform(); return; }  // no sample yet (e.g. missing module); clear stale color
            if      (x <= 50)   band = 0;
            else if (x <= 100)  band = 1;
            else if (x <= 150)  band = 2;
            else if (x <= 200)  band = 3;
            else if (x <= 300)  band = 4;
            else                band = 5;
          } else if (src == "CO2") {                 // ppm, SCD40
            const float x = id(co2).state;
            if (isnan(x)) { id(rgb_light).turn_off().perform(); return; }  // no sample yet (e.g. missing module); clear stale color
            if      (x <= 800)  band = 0;
            else if (x <= 1000) band = 1;
            else if (x <= 1500) band = 2;
            else if (x <= 2000) band = 3;
            else if (x <= 2500) band = 4;
            else                band = 5;
          } else if (src == "VOC Index") {           // Sensirion VOC index (matches "VOC Quality" text sensor)
            const float x = id(sen55_voc).state;
            if (isnan(x)) { id(rgb_light).turn_off().perform(); return; }  // no sample yet (e.g. missing module); clear stale color
            if      (x < 80)    band = 0;
            else if (x < 150)   band = 1;
            else if (x < 250)   band = 2;
            else if (x < 400)   band = 3;
            else                band = 4;            // VOC scale tops out at "extremely abnormal"
          }
          if (band < 0) return;

          auto call = id(rgb_light).turn_on();
          call.set_brightness(id(air_quality_led_brightness).state / 100.0f);
          switch (band) {
            case 0: call.set_rgb(0.0f, 1.0f, 0.0f); break;   // Green  - Good
            case 1: call.set_rgb(1.0f, 1.0f, 0.0f); break;   // Yellow - Moderate
            case 2: call.set_rgb(1.0f, 0.5f, 0.0f); break;   // Orange - Unhealthy (Sensitive)
            case 3: call.set_rgb(1.0f, 0.0f, 0.0f); break;   // Red    - Unhealthy
            case 4: call.set_rgb(0.6f, 0.0f, 1.0f); break;   // Purple - Very Unhealthy
            case 5: call.set_rgb(0.5f, 0.0f, 0.0f); break;   // Maroon - Hazardous
          }
          call.perform();

  # Runs after statusCheck/testScript finish so the air-quality color comes
  # back right away instead of waiting for the next sensor on_value (up to 60s
  # when CO2 is the source). statusCheck/testScript call this as their last
  # action; the short delay lets the calling script finish first so
  # update_air_quality_led's is_running() guard passes. mode: restart so a
  # rapid second status flash doesn't stack pending restores.
  - id: restore_air_quality_led
    mode: restart
    then:
      - delay: 200ms
      - script.execute: update_air_quality_led
