name: Build and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bypass-yaml-check:
        description: 'Bypass YAML change check (force build/publish)'
        type: boolean
        required: false
        default: false
  # release:
  #   types: [published]

jobs:
  build-and-publish:
    uses: ApolloAutomation/Workflows/.github/workflows/build.yml@main
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
    with:
      device-name: air-1
      # AIR-1.yaml is the end-user image served at firmware/ (OTA updates and
      # the Bluetooth Proxy "Disabled" option). The Factory image (improv +
      # factory test) is only used for first flashes via the web installer.
      yaml-files: |
        Integrations/ESPHome/AIR-1.yaml
        Integrations/ESPHome/AIR-1_Factory.yaml
        Integrations/ESPHome/AIR-1_BLE.yaml
      firmware-names: "1:firmware,1_Factory:firmware-factory,1_BLE:firmware-ble"
      core-yaml-path: Integrations/ESPHome/Core.yaml
      esphome-version: stable
      # Bypass check if manually triggered with bypass option
      check-yaml-changes: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.bypass-yaml-check == 'true') }}
      publish-to-pages: true
      has-installer: true
      installer-path: static
